# ===================================================================
# 开发环境 — MySQL 持久化数据库
# 首次启动前需先执行: mysql -u root -p < seed_data.sql
# @author Focus
# @date 2026-06-24
# ===================================================================

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/smart_wms_dev?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root

  # 每次启动执行建表 DDL（CREATE TABLE IF NOT EXISTS 确保幂等）
  sql:
    init:
      mode: always
      schema-locations: classpath:db/init_script.sql
      encoding: UTF-8
      continue-on-error: true

logging:
  level:
    root: INFO
    com.smartwms: DEBUG
