# ===================================================================
# 智库WMS - 智能仓储管理系统 公共配置
# @author Focus
# @date 2026-06-03
# ===================================================================

# 默认激活开发环境（可通过环境变量 SPRING_PROFILES_ACTIVE=prod 切换）
spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: smart-wms-backend
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}

# ---- MyBatis-Plus 配置（所有环境共用） ----
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ---- JWT 配置（生产环境通过环境变量注入） ----
jwt:
  secret: ${JWT_SECRET:smart-wms-jwt-secret-key-2026-must-be-at-least-256-bits!!}
  expiration-ms: ${JWT_EXPIRATION_MS:7200000}

# ---- AI 大模型配置（通过环境变量注入，避免硬编码） ----
ai:
  llm:
    api-key: ${AI_LLM_API_KEY:demo-api-key}
    base-url: ${AI_LLM_BASE_URL:https://api.llm-provider.com/v1}
    connect-timeout: 3000
    read-timeout: 10000

# ---- 日志配置 ----
logging:
  level:
    root: INFO
    com.smartwms: DEBUG
    com.smartwms.mapper: DEBUG
