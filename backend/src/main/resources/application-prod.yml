# ===================================================================
# 生产环境配置 — MySQL 持久化数据库
# 启动方式：java -jar app.jar --spring.profiles.active=prod
# 或设置环境变量：SPRING_PROFILES_ACTIVE=prod
# @author Focus
# @date 2026-06-10
# ===================================================================

spring:
  datasource:
    # 生产环境 MySQL（通过环境变量注入实际连接信息）
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/smart_wms_db?useSSL=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}

  # 生产环境不自动执行 DDL（首次部署需手动执行 init_script.sql 和 seed_data.sql）
  sql:
    init:
      mode: never
